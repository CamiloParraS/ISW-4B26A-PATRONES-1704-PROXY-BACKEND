spring.application.name=gpt
server.port=8080

# JSON file used to persist all runtime state (plans, quotas, rate limits, history)
slopgpt.persistence.file=./data/slopgpt-state.json

# JWT settings (replace secret in production)
slopgpt.jwt.secret=ReplaceWithAStrongSecretOf32CharsMinimum!
slopgpt.jwt.expire-seconds=3600
